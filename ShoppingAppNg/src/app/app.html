<div class="d-flex min-vh-100">
  <aside
    class="border-end bg-light flex-shrink-0 d-flex flex-column"
    style="width: 260px"
    aria-label="Main navigation"
  >
    <div class="p-3 border-bottom">
      <span class="fw-semibold">Shopping App</span>
    </div>
    <nav class="nav nav-pills flex-column p-2 gap-1 flex-grow-1">
      <a
        class="nav-link text-start"
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Home
      </a>
      <a class="nav-link text-start" routerLink="/products" routerLinkActive="active">
        Products
      </a>
      <a class="nav-link text-start" routerLink="/orders" routerLinkActive="active">
        Orders
      </a>
    </nav>
    <div class="p-3 border-top mt-auto">
      <div class="form-check form-switch">
        <input
          id="app-admin-role-toggle"
          class="form-check-input"
          type="checkbox"
          [ngModel]="userRoleService.isAdmin()"
          (ngModelChange)="onRoleChanged($event)"
        />
        <label class="form-check-label small" for="app-admin-role-toggle">
          {{ userRoleService.isAdmin() ? 'Admin' : 'User' }}
        </label>
      </div>
    </div>
  </aside>
  <main class="flex-grow-1 min-vh-100 bg-body">
    <router-outlet />
  </main>
</div>
