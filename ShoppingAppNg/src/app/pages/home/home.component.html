<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <h1 class="h3 m-0">Shopping App</h1>
            <div class="form-check form-switch">
              <input
                id="admin-role-toggle"
                class="form-check-input"
                type="checkbox"
                [ngModel]="userRoleService.isAdmin()"
                (ngModelChange)="onRoleChanged($event)"
              />
              <label class="form-check-label small" for="admin-role-toggle">
                {{ userRoleService.isAdmin() ? 'Admin' : 'User' }}
              </label>
            </div>
          </div>
          <p class="text-secondary mb-4">
            Choose where you want to go.
          </p>

          <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary" routerLink="/products">Products</a>
            <button class="btn btn-outline-secondary" type="button" disabled>
              Orders (Coming soon)
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
